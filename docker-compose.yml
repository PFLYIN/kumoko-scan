services:
  # 🗄️ Serviço 1: O Banco de Dados MySQL/MariaDB
  database:
    image: mariadb:10.6
    container_name: kumoko_db
    restart: always
    ports:
      - "3306:3306" # Mantido para você usar o DBeaver localmente
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./backup_banco.sql:/docker-entrypoint-initdb.d/backup_banco.sql
    networks:
      - kumoko_network

  # 🟢 Serviço 2: O Backend (Sem portas expostas diretamente)
  backend:
    build: ./Kumoko_Scan-Back
    container_name: kumoko_backend
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
    volumes:
      - ./Kumoko_Scan-Back:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - kumoko_network
    depends_on:
      - database

  # 🔵 Serviço 3: O Frontend (Sem portas expostas diretamente)
  frontend:
    build: ./Kumoko_Scan-Front/Kumoko_Scan
    container_name: kumoko_frontend
    restart: always
    volumes:
      - ./Kumoko_Scan-Front/Kumoko_Scan:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - kumoko_network

  # 🛡️ Serviço 4: O Proxy Reverso Nginx (Único exposto para a Web)
  proxy:
    image: nginx:alpine
    container_name: kumoko_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 👇 CORREÇÃO AQUI: Mapeando a pasta inteira onde está o seu default.conf
      - ./nginx:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - kumoko_network
    depends_on:
      - frontend
      - backend

networks:
  kumoko_network:
    driver: bridge

volumes:
  mariadb_data: