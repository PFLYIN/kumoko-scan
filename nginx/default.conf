# Configuração do Proxy Reverso da Kumoko Scan
server {
    listen 80;
    server_name kumokoscan.local localhost;

    # 🔄 Critério da Rubrica: Redirecionar automaticamente HTTP para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name kumokoscan.local localhost;

    client_max_body_size 50M;

    # 🔐 Certificados SSL
    ssl_certificate /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https://kumokoscan.local http://kumokoscan.local localhost; font-src 'self' data: https://cdnjs.cloudflare.com; connect-src 'self' ws: wss: https://kumokoscan.local http://kumokoscan.local;" always;

    # 🔵 Rota para o Frontend React (Vite)
    location / {
        proxy_pass http://kumoko_frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 🟢 Rota para o Backend API Express
    location /api/ {
        proxy_pass http://kumoko_backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 🎯 ATUALIZAÇÃO DA RUBRICA: Rota para arquivos e imagens do Backend
    location /files/ {
        proxy_pass http://kumoko_backend:3000/files/;
        proxy_set_header Host $host;
        client_max_body_size 50M;
    }
    
    # 🟡 Rota específica para a documentação do Swagger
    location /api-docs {
        proxy_pass http://kumoko_backend:3000/api-docs;
        proxy_set_header Host $host;
    }
}